name: ai_phone_assistant
description: Android AI phone assistant with Flutter UI and Kotlin telephony layer.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  http: ^1.2.2
  web_socket_channel: ^3.0.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+2
  phone_numbers_parser: ^9.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
