# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Web + realtime gateway (Node). Postgres is provisioned below and wired via DATABASE_URL.
# Dashboard secrets (each service): ai-phone-web → GROQ_API_KEY (and optional GEMINI_API_KEY)
#   ai-phone-realtime-gateway → OPENAI_API_KEY (required; JWT_SECRET comes from group ai-phone-shared)
version: "1"

databases:
  - name: ai-phone-db
    plan: free
    databaseName: ai_phone
    user: ai_phone

envVarGroups:
  - name: ai-phone-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true

services:
  - type: web
    name: ai-phone-web
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node scripts/ensure-schema.cjs && npm run start
    healthCheckPath: /api/health
    envVars:
      - fromGroup: ai-phone-shared
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-phone-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

  - type: web
    name: ai-phone-realtime-gateway
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run gateway
    envVars:
      - fromGroup: ai-phone-shared
      - key: NODE_VERSION
        value: "22"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-realtime-preview
