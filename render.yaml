# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Free-ish stack: Render free web services + free Groq (https://console.groq.com) for text answers.
# DB: use Neon free (https://neon.tech) → paste connection string as DATABASE_URL in the dashboard.
version: "1"
envVarGroups:
  - name: ai-phone-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true
services:
  - type: web
    name: ai-phone-web
    runtime: node
    plan: free
    rootDir: backend
    # npm ci needs package-lock.json in repo; npm install works if lockfile missing.
    buildCommand: npm install && npm run build
    # Free tier: no preDeployCommand — schema runs once per start (idempotent).
    startCommand: node scripts/ensure-schema.cjs && npm run start
    healthCheckPath: /api/health
    envVars:
      - fromGroup: ai-phone-shared
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
  - type: web
    name: ai-phone-realtime-gateway
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run gateway
    envVars:
      - fromGroup: ai-phone-shared
      - key: NODE_VERSION
        value: "22"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-realtime-preview
